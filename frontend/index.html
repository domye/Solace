<html lang="zh-CN">

			rel="stylesheet"

		/>
		<style>
			/* 开屏加载动画样式 */
			.splash-screen {
				position: fixed;
				inset: 0;
				z-index: 9999;
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				background: #f8fafc;
				transition:
					opacity 0.5s ease-out,
					visibility 0.5s ease-out,
					background 0.3s;
			}
			.splash-screen.fade-out {
				opacity: 0;
				visibility: hidden;
			}
			.splash-screen.hidden {
				display: none;
			}
			/* 像素初音容器 */
			.splash-character {
				width: 96px;
				height: 96px;
				image-rendering: pixelated;
				animation: miku-float 3s ease-in-out infinite;
			}
			@keyframes miku-float {
				0%,
				100% {
					transform: translateY(0);
				}
				50% {
					transform: translateY(-8px);
				}
			}
			/* 像素字体 */
			.splash-text {
				margin-top: 20px;
				font-family: "Courier New", monospace;
				font-size: 12px;
				color: #64748b;
				letter-spacing: 0.15em;
			}
			.splash-text::after {
				content: "...";
				animation: dots 1.2s steps(4) infinite;
			}
			@keyframes dots {
				0% {
					content: "";
				}
				25% {
					content: ".";
				}
				50% {
					content: "..";
				}
				75% {
					content: "...";
				}
			}
			/* 浅色主题 - 初音配色 */
			.splash-character svg .hair {
				fill: #39c5bb;
			}
			.splash-character svg .hair-light {
				fill: #62e2d0;
			}
			.splash-character svg .skin {
				fill: #fff1e0;
			}
			.splash-character svg .eye {
				fill: #333333;
			}
			.splash-character svg .blush {
				fill: #ffb6c1;
				animation: blush-pulse 2s ease-in-out infinite;
			}
			.splash-character svg .white {
				fill: #ffffff;
			}
			.splash-character svg .tie {
				fill: #00bfa5;
			}
			.splash-character svg .tie-light {
				fill: #2ed1b9;
			}
			.splash-character svg .black {
				fill: #222222;
			}
			@keyframes blush-pulse {
				0%,
				100% {
					opacity: 0.8;
				}
				50% {
					opacity: 1;
				}
			}
			/* 深色模式 */
			html.dark .splash-screen {
				background: #0f172a;
			}
			html.dark .splash-character svg .hair {
				fill: #5eead4;
			}
			html.dark .splash-character svg .hair-light {
				fill: #99f6e4;
			}
			html.dark .splash-character svg .skin {
				fill: #fef3c7;
			}
			html.dark .splash-character svg .eye {
				fill: #1e293b;
			}
			html.dark .splash-character svg .blush {
				fill: #fda4af;
			}
			html.dark .splash-character svg .white {
				fill: #f1f5f9;
			}
			html.dark .splash-character svg .tie {
				fill: #2dd4bf;
			}
			html.dark .splash-character svg .tie-light {
				fill: #5eead4;
			}
			html.dark .splash-character svg .black {
				fill: #334155;
			}
			html.dark .splash-text {
				color: #94a3b8;
			}
		</style>
	</head>
	<body>
		<script>
			// 尽早检测主题设置，避免开屏闪烁
			(function () {
				try {
					const stored = localStorage.getItem("theme-storage");
					if (stored) {
						const { state } = JSON.parse(stored);
						if (state?.theme === "dark") {
							document.documentElement.classList.add("dark");
						}
					} else if (
						window.matchMedia("(prefers-color-scheme: dark)").matches
					) {
						document.documentElement.classList.add("dark");
					}
				} catch (e) {}
			})();
		</script>
