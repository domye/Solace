        in: query
        name: page
        type: integer
      - default: 10
        description: 每页数量
        in: query
        name: pageSize
        type: integer
      - description: 按状态筛选
        in: query
        name: status
        type: string
      - description: 按模板筛选
        in: query
        name: template
        type: string
      produces:
