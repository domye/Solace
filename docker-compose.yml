name: blog

services:
  db:
    image: postgres:16-alpine
    container_name: solace-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: blog
      POSTGRES_USER: solace
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: Asia/Shanghai
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U solace -d blog"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - solace-net

  backend:
    image: domye/blog-backend:latest
    container_name: solace-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      CONFIG_PATH: /app/config/config.toml
      UPLOAD_DIR: /app/uploads
      IMGBED_ENDPOINT: ${IMGBED_ENDPOINT:-}
      IMGBED_TOKEN: ${IMGBED_TOKEN:-}
      IMGBED_FIELD: ${IMGBED_FIELD:-file}
      IMGBED_UPLOAD_FOLDER: ${IMGBED_UPLOAD_FOLDER:-}
      TZ: Asia/Shanghai
    volumes:
      - ./config:/app/config:rw
      - ./config/uploads:/app/uploads:rw
    expose:
      - "8080"
    networks:
      - solace-net

  frontend:
    image: solace-frontend-local:latest
    container_name: solace-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    environment:
      VITE_API_BASE: /api/v1
      SITE_BASE_URL: https://blog.meilunaria.dpdns.org
      SITE_NAME: 花生酱拌饭
      SITE_DESCRIPTION: 你所热爱的，就是你的生活
    ports:
      - "127.0.0.1:8088:80"
    networks:
      - solace-net

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: solace-cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      frontend:
        condition: service_started
    profiles: ["public"]
    networks:
      - solace-net

networks:
  solace-net:
    driver: bridge

volumes:
  postgres_data:
